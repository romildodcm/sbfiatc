<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Audio Stream</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 24px;
            padding: 24px;
        }
        .player {
            background: #16213e;
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            max-width: 420px;
            width: 100%;
        }
        h1 {
            font-size: 1.3rem;
            margin-bottom: 4px;
        }
        .subtitle {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 16px;
        }
        .badge {
            display: inline-block;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .badge.live { background: #4ecca3; color: #1a1a2e; }
        .badge.esp32 { background: #f39c12; color: #1a1a2e; }
        audio {
            width: 100%;
            margin-top: 12px;
        }
        .mount-info {
            margin-top: 12px;
            font-size: 0.7rem;
            color: #555;
        }
        .page-title {
            font-size: 1.6rem;
            margin-bottom: 4px;
        }
        .page-subtitle {
            color: #888;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div>
        <h1 class="page-title">SBFI Radio Streams</h1>
        <p class="page-subtitle">Icecast — ic.io.tec.br</p>
    </div>

    <div class="player">
        <span class="badge live">ATC LIVE</span>
        <h1>SBFI ATC</h1>
        <p class="subtitle">Stream de rádio aviação — Foz do Iguaçu</p>
        <audio controls preload="none">
            <source src="https://ic.io.tec.br/sbfi" type="audio/mpeg">
            Seu navegador não suporta áudio.
        </audio>
        <p class="mount-info">Mount: /sbfi • audio/mpeg</p>
    </div>

    <div class="player">
        <span class="badge esp32">ESP32</span>
        <h1>ESP32 Aviation Radio</h1>
        <p class="subtitle">Stream de teste — Beep 440Hz MP3 (Fase 1)</p>
        <audio controls preload="none">
            <source src="https://ic.io.tec.br/sbfi2" type="audio/mpeg">
            Seu navegador não suporta áudio.
        </audio>
        <p class="mount-info">Mount: /sbfi2 • audio/mpeg • 16kHz/32kbps/mono</p>
    </div>
</body>
</html>
