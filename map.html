<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

  <link rel="apple-touch-icon" sizes="180x180" href="/sbfi/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/sbfi/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/sbfi/favicon-16x16.png">
  <link rel="manifest" href="/sbfi/site.webmanifest">

  <link rel="canonical" href="https://atc.iguspotters.com.br/map">
  <meta name="robots" content="index, follow">
  <meta name="description" content="Mapa radar ADS-B ao vivo — Aeronaves na região de IGU/SBFI, Foz do Iguaçu. Visualize tráfego aéreo em tempo real com fonia ATC.">
  <meta name="theme-color" content="#0a0a0a">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://atc.iguspotters.com.br/map">
  <meta property="og:title" content="Radar ADS-B — IGU/SBFI">
  <meta property="og:description" content="Mapa radar ADS-B ao vivo na região de IGU/SBFI com fonia ATC.">
  <meta property="og:image" content="https://atc.iguspotters.com.br/sbfi/android-chrome-512x512.png">

  <title>Radar ADS-B — IGU/SBFI</title>

  <style>
    /* ========== RADAR THEME ========== */
    :root {
      --radar-bg: #0a0a0a;
      --radar-green: #00ff41;
      --radar-green-dim: #00cc33;
      --radar-green-faint: rgba(0, 255, 65, 0.15);
      --radar-green-glow: rgba(0, 255, 65, 0.4);
      --radar-ring: rgba(0, 255, 65, 0.25);
      --radar-text: #00ff41;
      --radar-text-dim: rgba(0, 255, 65, 0.6);
      --radar-panel-bg: rgba(10, 10, 10, 0.92);
      --radar-border: rgba(0, 255, 65, 0.3);
    }

    [data-theme="red"] {
      --radar-green: #ff3333;
      --radar-green-dim: #cc2828;
      --radar-green-faint: rgba(255, 51, 51, 0.15);
      --radar-green-glow: rgba(255, 51, 51, 0.4);
      --radar-ring: rgba(255, 51, 51, 0.25);
      --radar-text: #ff3333;
      --radar-text-dim: rgba(255, 51, 51, 0.6);
      --radar-panel-bg: rgba(10, 5, 5, 0.92);
      --radar-border: rgba(255, 51, 51, 0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto Mono', monospace;
      background: var(--radar-bg);
      color: var(--radar-text);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
    }

    /* Impedir zoom de pinça nos overlays — gesto passa ao mapa */
    .radar-header,
    .audio-panel,
    .controls-stack,
    .info-panel,
    .toggle-panel-btn,
    .reset-view-btn,
    .alt-legend {
      touch-action: manipulation;
    }

    /* ========== HEADER ========== */
    .radar-header {
      background: var(--radar-panel-bg);
      border-bottom: 1px solid var(--radar-border);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1000;
      flex-shrink: 0;
    }

    .radar-header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--radar-green);
      text-shadow: 0 0 10px var(--radar-green-glow);
    }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-nav a {
      color: var(--radar-text-dim);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .header-nav a:hover {
      color: var(--radar-green);
      text-shadow: 0 0 8px var(--radar-green-glow);
    }

    .header-stats {
      display: flex;
      gap: 20px;
      font-size: 12px;
      color: var(--radar-text-dim);
    }

    .stat-value {
      color: var(--radar-green);
      font-weight: 700;
    }

    /* ========== MAP CONTAINER ========== */
    #radar-map {
      flex: 1;
      width: 100%;
      background: var(--radar-bg);
    }

    /* Leaflet tile verde radar */
    .leaflet-tile-pane {
      filter: saturate(0) brightness(0.3) contrast(1.2);
    }

    .leaflet-container {
      background: var(--radar-bg) !important;
      font-family: 'Roboto Mono', monospace;
    }

    /* Zoom controls — canto inferior esquerdo (desktop) */
    .leaflet-top.leaflet-left {
      top: auto !important;
      bottom: 10px !important;
      left: 10px !important;
      right: auto !important;
    }

    /* Ocultar controles padrão do Leaflet */
    .leaflet-control-zoom,
    .leaflet-bar {
      border: 1px solid var(--radar-border) !important;
    }

    .leaflet-control-zoom a,
    .leaflet-bar a {
      background: var(--radar-panel-bg) !important;
      color: var(--radar-green) !important;
      border-color: var(--radar-border) !important;
      width: 30px !important;
      height: 30px !important;
      line-height: 30px !important;
      font-size: 16px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
    }

    .leaflet-control-zoom a:hover,
    .leaflet-bar a:hover {
      background: var(--radar-green-faint) !important;
      box-shadow: 0 0 8px var(--radar-green-glow) !important;
    }

    .leaflet-control-attribution {
      display: none !important;
    }

    /* ========== RANGE RINGS OVERLAY ========== */
    .range-ring-label {
      color: var(--radar-text-dim);
      font-size: 10px;
      font-family: 'Roboto Mono', monospace;
      background: none;
      border: none;
      white-space: nowrap;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }

    /* ========== ALTITUDE LEGEND ========== */
    .alt-legend {
      position: fixed;
      bottom: 50px;
      left: 52px;
      z-index: 1000;
      background: var(--radar-panel-bg);
      border: 1px solid var(--radar-border);
      border-radius: 4px;
      padding: 8px 10px;
      font-family: 'Roboto Mono', monospace;
      font-size: 9px;
      display: none;
      backdrop-filter: blur(8px);
    }

    .alt-legend.visible {
      display: block;
    }

    .alt-legend-title {
      color: var(--radar-text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
      font-size: 8px;
    }

    .alt-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2px;
    }

    .alt-legend-color {
      width: 14px;
      height: 3px;
      border-radius: 1px;
    }

    .alt-legend-label {
      color: var(--radar-text-dim);
    }

    /* ========== AIRCRAFT LABEL ========== */
    .aircraft-icon-wrapper {
      position: relative;
      width: 20px;
      height: 20px;
    }

    .aircraft-label {
      position: absolute;
      left: 22px;
      top: -2px;
      white-space: nowrap;
      font-family: 'Roboto Mono', monospace;
      font-size: 9px;
      color: var(--radar-green);
      text-shadow: 0 0 4px rgba(0,0,0,0.9), 0 0 2px rgba(0,0,0,0.7);
      line-height: 1.3;
      pointer-events: none;
    }

    .aircraft-label .ac-callsign {
      font-weight: 700;
      font-size: 10px;
    }

    .aircraft-label .ac-reg {
      font-weight: 400;
      font-size: 9px;
      color: var(--radar-text-dim);
    }

    .aircraft-label .ac-detail {
      color: var(--radar-text-dim);
      font-size: 8px;
    }

    .aircraft-selected .aircraft-label {
      display: none;
    }

    /* ========== AIRCRAFT TOOLTIP ========== */
    .aircraft-tooltip {
      background: var(--radar-panel-bg) !important;
      border: 1px solid var(--radar-border) !important;
      color: var(--radar-green) !important;
      font-family: 'Roboto Mono', monospace !important;
      font-size: 11px !important;
      padding: 6px 10px !important;
      border-radius: 2px !important;
      box-shadow: 0 0 12px var(--radar-green-faint) !important;
      line-height: 1.5;
    }

    .aircraft-tooltip::before {
      border-top-color: var(--radar-border) !important;
    }

    .leaflet-tooltip-top::before {
      border-top-color: var(--radar-border) !important;
    }

    /* ========== AIRCRAFT POPUP ========== */
    .leaflet-popup-content-wrapper {
      background: var(--radar-panel-bg) !important;
      border: 1px solid var(--radar-border) !important;
      border-radius: 4px !important;
      color: var(--radar-green) !important;
      font-family: 'Roboto Mono', monospace !important;
      box-shadow: 0 0 20px var(--radar-green-faint) !important;
    }

    .leaflet-popup-tip {
      background: var(--radar-panel-bg) !important;
      border: 1px solid var(--radar-border) !important;
    }

    .leaflet-popup-close-button {
      color: var(--radar-green) !important;
    }

    .aircraft-popup {
      font-size: 12px;
      line-height: 1.8;
    }

    .aircraft-popup .callsign {
      font-size: 14px;
      font-weight: 700;
      color: var(--radar-green);
      border-bottom: 1px solid var(--radar-border);
      padding-bottom: 4px;
      margin-bottom: 4px;
    }

    .aircraft-popup .label {
      color: var(--radar-text-dim);
    }

    /* ========== AIRCRAFT DETAIL (fixed top-left, multi-card) ========== */
    #aircraftDetail {
      display: none;
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      pointer-events: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--radar-border) transparent;
    }
    #aircraftDetail.visible { display: flex; flex-direction: column; gap: 6px; }
    .detail-card {
      background: var(--radar-panel-bg);
      border: 1px solid var(--radar-border);
      border-radius: 4px;
      padding: 10px 14px;
      font-family: 'Roboto Mono', monospace;
      font-size: 12px;
      line-height: 1.8;
      color: var(--radar-green);
      box-shadow: 0 0 20px var(--radar-green-faint);
      min-width: 140px;
      max-width: 165px;
      position: relative;
    }
    .detail-card .callsign {
      font-size: 14px;
      font-weight: 700;
      border-bottom: 1px solid var(--radar-border);
      padding-bottom: 4px;
      margin-bottom: 4px;
    }
    .detail-card .label {
      color: var(--radar-text-dim);
    }
    .detail-card .detail-close {
      position: absolute;
      top: 4px;
      right: 8px;
      background: none;
      border: none;
      color: var(--radar-green);
      font-size: 16px;
      cursor: pointer;
    }

    /* ========== AUDIO PLAYER PANEL ========== */
    .controls-stack {
      position: fixed;
      bottom: 10px;
      right: 10px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .audio-panel {
      background: var(--radar-panel-bg);
      border: 1px solid var(--radar-border);
      border-radius: 4px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(8px);
    }

    .audio-panel .play-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid var(--radar-green);
      background: transparent;
      color: var(--radar-green);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .audio-panel .play-btn:hover {
      background: var(--radar-green-faint);
      box-shadow: 0 0 12px var(--radar-green-glow);
    }

    .audio-panel .play-btn.playing {
      background: var(--radar-green-faint);
      box-shadow: 0 0 12px var(--radar-green-glow);
    }

    .audio-panel .play-btn .material-icons {
      font-size: 16px;
      color: var(--radar-green);
    }

    .audio-info {
      flex: 1;
      min-width: 0;
    }

    .audio-info .label {
      font-size: 10px;
      color: var(--radar-text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .audio-info .status-text {
      font-size: 12px;
      color: var(--radar-green);
    }

    .audio-info .status-text.live {
      animation: pulse-text 2s infinite;
    }

    @keyframes pulse-text {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .volume-control {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .volume-control button {
      background: none;
      border: none;
      color: var(--radar-text-dim);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
    }

    .volume-control button:hover {
      color: var(--radar-green);
    }

    .volume-control button .material-icons {
      font-size: 18px;
      color: inherit;
    }

    .volume-control input[type="range"] {
      width: 60px;
      height: 2px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--radar-border);
      outline: none;
      border-radius: 1px;
    }

    .volume-control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--radar-green);
      cursor: pointer;
      box-shadow: 0 0 6px var(--radar-green-glow);
    }

    .volume-control input[type="range"]::-moz-range-thumb {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--radar-green);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 6px var(--radar-green-glow);
    }

    /* ========== SWEEP ANIMATION ========== */
    .radar-sweep {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 450;
      overflow: hidden;
    }

    /* ========== INFO PANEL (aircraft list) ========== */
    .info-panel {
      position: fixed;
      top: 50px;
      right: 10px;
      width: 240px;
      max-height: calc(100vh - 120px);
      background: var(--radar-panel-bg);
      border: 1px solid var(--radar-border);
      border-radius: 4px;
      z-index: 1000;
      overflow-y: auto;
      backdrop-filter: blur(8px);
    }

    .info-panel-header {
      padding: 10px 12px;
      border-bottom: 1px solid var(--radar-border);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--radar-text-dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: var(--radar-panel-bg);
    }

    .aircraft-list {
      padding: 4px 0;
    }

    .aircraft-item {
      padding: 6px 12px;
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--radar-green-faint);
      cursor: pointer;
      transition: background 0.15s;
    }

    .aircraft-item:hover {
      background: var(--radar-green-faint);
    }

    .aircraft-item .callsign {
      font-weight: 700;
      min-width: 70px;
    }

    .aircraft-item .alt {
      color: var(--radar-text-dim);
      font-size: 10px;
    }

    .aircraft-item .speed {
      color: var(--radar-text-dim);
      font-size: 10px;
    }

    /* ========== NO DATA MESSAGE ========== */
    .no-data {
      padding: 16px 12px;
      text-align: center;
      color: var(--radar-text-dim);
      font-size: 11px;
    }

    /* ========== DATA SOURCE CONFIG ========== */
    .source-indicator {
      font-size: 10px;
      color: var(--radar-text-dim);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .source-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--radar-green);
      box-shadow: 0 0 4px var(--radar-green-glow);
    }

    .source-dot.offline {
      background: #ff4444;
      box-shadow: 0 0 4px rgba(255, 68, 68, 0.4);
    }

    /* ========== TOGGLE PANEL BUTTON ========== */
    .toggle-panel-btn {
      position: fixed;
      top: 56px;
      right: 10px;
      z-index: 1001;
      background: var(--radar-panel-bg);
      border: 1px solid var(--radar-border);
      color: var(--radar-green);
      width: 36px;
      height: 36px;
      border-radius: 4px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .toggle-panel-btn:hover {
      background: var(--radar-green-faint);
      box-shadow: 0 0 8px var(--radar-green-glow);
    }

    /* ========== RESPONSIVE ========== */
    @media screen and (max-width: 768px) {
      .header-stats { gap: 10px; font-size: 10px; }

      .radar-header h1 { font-size: 13px; letter-spacing: 1px; }

      .header-nav a { font-size: 11px; }

      /* Painel lateral: escondido por padrão no mobile */
      .info-panel {
        position: fixed;
        top: 44px;
        right: 0;
        bottom: 60px;
        left: 0;
        width: 100%;
        max-height: none;
        border-radius: 0;
        border: none;
        border-top: 1px solid var(--radar-border);
        transform: translateX(100%);
        transition: transform 0.25s ease;
        z-index: 1002;
      }

      .info-panel.visible {
        transform: translateX(0);
      }

      .toggle-panel-btn {
        display: flex;
        top: 50px;
        right: 10px;
        width: 30px;
        height: 30px;
        font-size: 16px;
      }

      .info-panel-header {
        padding: 12px 16px;
        font-size: 12px;
      }

      .info-panel-close {
        background: none;
        border: none;
        color: var(--radar-green);
        font-size: 18px;
        cursor: pointer;
        padding: 0 4px;
      }

      .aircraft-item {
        padding: 10px 16px;
        font-size: 12px;
      }

      .volume-control input[type="range"] {
        width: 50px;
      }

      .audio-info .label { font-size: 9px; }

      .audio-panel { padding: 8px 12px; }

      /* Ocultar zoom no mobile */
      .leaflet-top.leaflet-left {
        display: none !important;
      }

      /* Botões de ação do mapa empilhados no mobile */
      .map-action-btns {
        flex-direction: column;
      }

      .map-action-btn {
        width: 30px;
        height: 30px;
      }

      .map-action-btn .material-icons {
        font-size: 16px;
      }
    }

    @media screen and (min-width: 769px) {
      .info-panel-close { display: none; }
    }

    /* ========== MAP ACTION BUTTONS ========== */
    .map-action-btns {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .map-action-btn {
      background: var(--radar-panel-bg);
      border: 1px solid var(--radar-border);
      color: var(--radar-green);
      width: 30px;
      height: 30px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      padding: 0;
    }

    .map-action-btn:hover {
      background: var(--radar-green-faint);
      box-shadow: 0 0 8px var(--radar-green-glow);
    }

    .map-action-btn .material-icons {
      font-size: 16px;
      color: var(--radar-green);
    }

    .map-action-btn.locating {
      animation: pulse-btn 1.5s infinite;
    }

    @keyframes pulse-btn {
      0%, 100% { box-shadow: 0 0 4px var(--radar-green-glow); }
      50% { box-shadow: 0 0 14px var(--radar-green-glow); }
    }
  </style>
</head>

<body>
  <!-- HEADER -->
  <div class="radar-header">
    <h1>SBFI RADAR</h1>
    <div class="header-nav">
      <a href="/">FONIA</a>
      <a href="/map" style="color: var(--radar-green);">MAPA</a>
    </div>
    <div class="header-stats">
      <span>AERONAVES: <span class="stat-value" id="aircraftCount">0</span></span>
      <div class="source-indicator">
        <span class="source-dot" id="sourceDot"></span>
        <span id="sourceLabel">OFFLINE</span>
      </div>
    </div>
  </div>

  <!-- MAP -->
  <div id="radar-map">
    <div id="aircraftDetail"></div>
  </div>

  <!-- TOGGLE PANEL BUTTON (mobile) -->
  <button class="toggle-panel-btn" id="togglePanelBtn" title="Lista de aeronaves">▶</button>

  <!-- RESET VIEW BUTTON + MY LOCATION -->
  <!-- CONTROLS STACK (botões + player) -->
  <div class="controls-stack">
    <div class="map-action-btns">

  <!-- ALTITUDE LEGEND (trail) -->
  <div class="alt-legend" id="altLegend" style="display:none">
    <div class="alt-legend-title">Altitude</div>
    <div class="alt-legend-item"><span class="alt-legend-color" style="background:rgb(255,30,30)"></span><span class="alt-legend-label">45000ft</span></div>
    <div class="alt-legend-item"><span class="alt-legend-color" style="background:rgb(255,100,0)"></span><span class="alt-legend-label">35000ft</span></div>
    <div class="alt-legend-item"><span class="alt-legend-color" style="background:rgb(255,220,0)"></span><span class="alt-legend-label">25000ft</span></div>
    <div class="alt-legend-item"><span class="alt-legend-color" style="background:rgb(0,220,120)"></span><span class="alt-legend-label">15000ft</span></div>
    <div class="alt-legend-item"><span class="alt-legend-color" style="background:rgb(0,100,255)"></span><span class="alt-legend-label">5000ft</span></div>

  <!-- INFO PANEL (aircraft list) -->
  <div class="info-panel" id="infoPanel">
    <div class="info-panel-header">
      <span>TRÁFEGO</span>

        <button class="info-panel-close" id="closePanelBtn" title="Fechar">✕</button>
      </span>

      <div class="no-data">Aguardando dados ADS-B...</div>

  <script>
    // ==========================================
    // CONFIGURAÇÃO
    // ==========================================
    const SBFI = { lat: -25.5963, lng: -54.4854 };

    // Tema — cores dinâmicas para elementos JS (canvas/SVG)
    function getThemeColors() {
      const isRed = document.documentElement.getAttribute('data-theme') === 'red';
      return {
        main:      isRed ? '#ff3333' : '#00ff41',
        dim:       isRed ? '#cc2828' : '#00cc33',
        ring:      isRed ? 'rgba(255, 51, 51, 0.2)' : 'rgba(0, 255, 65, 0.2)',
        ringDyn:   isRed ? 'rgba(255, 51, 51, 0.15)' : 'rgba(0, 255, 65, 0.15)',
        cross:     isRed ? 'rgba(255, 51, 51, 0.4)' : 'rgba(0, 255, 65, 0.4)',
        textGlow:  isRed ? 'rgba(255,51,51,0.6)' : 'rgba(0,255,65,0.6)',
        textDim:   isRed ? 'rgba(255,51,51,0.55)' : 'rgba(0,255,65,0.55)',
      };
    }
    const MAX_RANGE_KM = 400;
    const REFRESH_INTERVAL_MS = 10000; // 10 segundos

    // Endpoint ADS-B — API própria
    const ADSB_API_BASE = 'https://adsb.io.tec.br/api';

    let aircraftMarkers = {};
    let map, rangeGroup, aircraftGroup;
    let bordersLayer = null;
    let bordersVisible = false;
    let bordersCache = {};  // { '110m': geojson, '50m': geojson, '10m': geojson }
    let currentBordersRes = null;
    let refreshTimer = null;

    // ==========================================
    // TRAIL — COR POR ALTITUDE
    // ==========================================
    function altitudeToColor(altFt) {
      const isRed = document.documentElement.getAttribute('data-theme') === 'red';

      if (isRed) {
        // Modo noite: degradê vermelho escuro → vermelho vivo
        const a = Math.max(0, Math.min(45000, altFt || 0));
        const t = a / 45000; // 0..1
        const r = Math.round(80 + t * 175);  // 80 → 255
        const g = Math.round(0  + t * 30);   //  0 → 30
        const b = Math.round(0  + t * 20);   //  0 → 20
        return `rgb(${r},${g},${b})`;
      }

      // 0 ft → roxo, 10000 → azul, 20000 → verde, 30000 → amarelo, 40000+ → vermelho
      const stops = [
        { alt: 0,     r: 148, g: 0,   b: 211 },  // roxo
        { alt: 5000,  r: 0,   g: 100, b: 255 },  // azul
        { alt: 15000, r: 0,   g: 220, b: 120 },  // verde
        { alt: 25000, r: 255, g: 220, b: 0   },  // amarelo
        { alt: 35000, r: 255, g: 100, b: 0   },  // laranja
        { alt: 45000, r: 255, g: 30,  b: 30  },  // vermelho
      ];

      const a = Math.max(0, altFt || 0);

      // Achar segmento
      if (a <= stops[0].alt) return `rgb(${stops[0].r},${stops[0].g},${stops[0].b})`;
      if (a >= stops[stops.length - 1].alt) {
        const s = stops[stops.length - 1];
        return `rgb(${s.r},${s.g},${s.b})`;
      }

      for (let i = 0; i < stops.length - 1; i++) {
        if (a >= stops[i].alt && a <= stops[i + 1].alt) {
          const t = (a - stops[i].alt) / (stops[i + 1].alt - stops[i].alt);
          const r = Math.round(stops[i].r + (stops[i + 1].r - stops[i].r) * t);
          const g = Math.round(stops[i].g + (stops[i + 1].g - stops[i].g) * t);
          const b = Math.round(stops[i].b + (stops[i + 1].b - stops[i].b) * t);
          return `rgb(${r},${g},${b})`;
        }
      }
      return getThemeColors().main;
    }

    // ==========================================
    // PAINEL DETALHES DA AERONAVE (fixo top-left)
    // ==========================================
    function showAircraftDetail(a) {
      const container = document.getElementById('aircraftDetail');
      // Atualizar card existente ou criar novo
      let card = container.querySelector(`.detail-card[data-icao="${a.icao}"]`);
      if (!card) {
        card = document.createElement('div');
        card.className = 'detail-card';
        card.setAttribute('data-icao', a.icao);
        container.appendChild(card);
      }
      card.innerHTML = `
        <button class="detail-close" onclick="removeAircraftTrail('${a.icao}')">✕</button>
        <div class="callsign">${a.callsign}</div>
        <span class="label">ICAO:</span> ${a.icao}<br>
        <span class="label">ALT:</span> ${a.alt != null ? a.alt.toLocaleString() + ' ft' : '---'}<br>
        <span class="label">SPD:</span> ${a.speed != null ? a.speed + ' kt' : '---'}<br>
        <span class="label">HDG:</span> ${a.track != null ? Math.round(a.track) + '°' : '---'}<br>
        <span class="label">V/S:</span> ${a.vrate != null ? (a.vrate > 0 ? '+' : '') + a.vrate + ' fpm' : '---'}<br>
        <span class="label">SQK:</span> ${a.squawk || '---'}<br>
        <span class="label">DIST:</span> ${a.distance} km<br>
        <span class="label">GND:</span> ${a.onGround ? 'SIM' : 'NÃO'}`;
      container.classList.add('visible');
    }

    function hideAircraftDetail(icao) {
      const container = document.getElementById('aircraftDetail');
      if (icao) {
        const card = container.querySelector(`.detail-card[data-icao="${icao}"]`);
        if (card) card.remove();
        if (!container.querySelector('.detail-card')) container.classList.remove('visible');
      } else {
        container.innerHTML = '';
        container.classList.remove('visible');
      }
    }

    // ==========================================
    // DESENHAR / LIMPAR TRAIL
    // ==========================================
    let trailLayersByIcao = {};
    let selectedIcaos = new Set();
    let followingIcao = null;

    function drawTrail(icao, zoomToAircraft = true) {
      // Toggle: se já selecionado, remover
      if (selectedIcaos.has(icao)) {
        removeAircraftTrail(icao);
        return;
      }

      selectedIcaos.add(icao);
      followingIcao = icao;

      // Esconder label do ícone na aeronave selecionada
      const selMarker = aircraftMarkers[icao];
      if (selMarker && selMarker._icon) {
        selMarker._icon.classList.add('aircraft-selected');
      }

      // Mostrar painel de detalhes
      if (selMarker && selMarker._acData) {
        showAircraftDetail(selMarker._acData);
      }

      // Zoom médio na aeronave (só no clique direto)
      if (zoomToAircraft) {
        if (selMarker) {
          map.setView(selMarker.getLatLng(), 10, { animate: true });
        }
      }

      // Buscar trail real da API
      fetchTrail(icao);
    }

    function removeAircraftTrail(icao) {
      // Restaurar label da aeronave
      if (aircraftMarkers[icao]) {
        const prev = aircraftMarkers[icao];
        if (prev._icon) prev._icon.classList.remove('aircraft-selected');
        const d = prev._acData;
        if (d && !prev.getTooltip()) {
          const tip = `${d.callsign}  FL${d.alt ? Math.round(d.alt / 100) : '---'}`;
          prev.bindTooltip(tip, { permanent: false, direction: 'top', offset: [0, -12], className: 'aircraft-tooltip' });
        }
      }
      // Remover trail layers deste ICAO
      if (trailLayersByIcao[icao]) {
        trailLayersByIcao[icao].forEach(l => map.removeLayer(l));
        delete trailLayersByIcao[icao];
      }
      selectedIcaos.delete(icao);
      hideAircraftDetail(icao);
      if (followingIcao === icao) {
        followingIcao = selectedIcaos.size > 0 ? [...selectedIcaos].pop() : null;
      }
    }

    async function fetchTrail(icao) {
      try {
        const resp = await fetch(`${ADSB_API_BASE}/aircraft/${icao}/trail?minutes=30`);
        if (!resp.ok) return;
        const data = await resp.json();
        const trail = (data.trail || []).map(p => ({
          lat: Number(p.lat),
          lon: Number(p.lon),
          alt: p.alt != null ? Number(p.alt) : 0 // já em pés
        }));
        if (trail.length < 2) return;
        renderTrail(trail, icao);
      } catch (err) {
        console.warn('Erro ao buscar trail:', err.message);
      }
    }

    function renderTrail(trail, icao) {
      // Limpar trail anterior deste ICAO (re-draw)
      if (trailLayersByIcao[icao]) {
        trailLayersByIcao[icao].forEach(l => map.removeLayer(l));
      }
      const layers = [];

      // Desenhar segmentos coloridos por altitude
      for (let i = 0; i < trail.length - 1; i++) {
        const p1 = trail[i];
        const p2 = trail[i + 1];
        const avgAlt = ((p1.alt || 0) + (p2.alt || 0)) / 2;
        const color = altitudeToColor(avgAlt);

        const line = L.polyline(
          [[p1.lat, p1.lon], [p2.lat, p2.lon]],
          {
            color: color,
            weight: 2.5,
            opacity: 0.4 + (i / trail.length) * 0.6,
            interactive: false
          }
        ).addTo(map);
        layers.push(line);
      }

      // Pontos nos vértices do trail
      trail.forEach((p, i) => {
        const opacity = 0.3 + (i / trail.length) * 0.7;
        const circle = L.circleMarker([p.lat, p.lon], {
          radius: 2,
          color: altitudeToColor(p.alt || 0),
          fillColor: altitudeToColor(p.alt || 0),
          fillOpacity: opacity,
          weight: 0,
          interactive: false
        }).addTo(map);
        layers.push(circle);
      });

      trailLayersByIcao[icao] = layers;
    }

    function clearTrail() {
      // Restaurar labels de todas as aeronaves selecionadas
      selectedIcaos.forEach(icao => {
        if (aircraftMarkers[icao]) {
          const prev = aircraftMarkers[icao];
          if (prev._icon) prev._icon.classList.remove('aircraft-selected');
          const d = prev._acData;
          if (d && !prev.getTooltip()) {
            const tip = `${d.callsign}  FL${d.alt ? Math.round(d.alt / 100) : '---'}`;
            prev.bindTooltip(tip, { permanent: false, direction: 'top', offset: [0, -12], className: 'aircraft-tooltip' });
          }
        }
      });
      hideAircraftDetail();
      Object.values(trailLayersByIcao).forEach(layers => layers.forEach(l => map.removeLayer(l)));
      trailLayersByIcao = {};
      selectedIcaos.clear();
      followingIcao = null;
    }

    // ==========================================
    // MAPA
    // ==========================================
    function initMap() {
      map = L.map('radar-map', {
        center: [SBFI.lat, SBFI.lng],
        zoom: 9,
        zoomControl: true,
        attributionControl: false,
        maxBounds: [
          [SBFI.lat - 5, SBFI.lng - 6],
          [SBFI.lat + 5, SBFI.lng + 6]
        ],
        minZoom: 5,
        maxZoom: 14
      });

      // Tiles: CartoDB dark (semáforo escuro → filtramos no CSS)
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd',
        maxZoom: 19
      }).addTo(map);

      rangeGroup = L.layerGroup().addTo(map);
      aircraftGroup = L.layerGroup().addTo(map);

      // Fronteiras de países (Natural Earth 110m via TopoJSON)
      drawCountryBorders();

      drawRangeRings();
      drawAirportMarkers();
    }

    // ==========================================
    // FRONTEIRAS DE PAÍSES (resolução progressiva)
    // ==========================================
    // Bounding box do radar para clip
    const BORDERS_BBOX = {
      minLat: SBFI.lat - 5, maxLat: SBFI.lat + 5,
      minLng: SBFI.lng - 6, maxLng: SBFI.lng + 6
    };
    const TARGET_COUNTRY_IDS = new Set(['076', '600', '032']); // BR, PY, AR

    // Resolução por zoom
    function getBordersResolution() {
      const z = map.getZoom();
      if (z >= 10) return '10m';
      if (z >= 8) return '50m';
      return '110m';
    }

    const BORDERS_URLS = {
      '110m': 'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json',
      '50m':  'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json',
      '10m':  'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-10m.json'
    };

    function clipCoords(coords) {
      // Filtra pontos fora do bbox (simplificação rápida)
      return coords.filter(c => {
        const lng = c[0], lat = c[1];
        return lat >= BORDERS_BBOX.minLat && lat <= BORDERS_BBOX.maxLat &&
               lng >= BORDERS_BBOX.minLng && lng <= BORDERS_BBOX.maxLng;
      });
    }

    function clipGeometry(geom) {
      if (geom.type === 'Polygon') {
        const clipped = geom.coordinates.map(ring => clipCoords(ring)).filter(r => r.length >= 3);
        return clipped.length ? { type: 'Polygon', coordinates: clipped } : null;
      }
      if (geom.type === 'MultiPolygon') {
        const polys = geom.coordinates
          .map(poly => poly.map(ring => clipCoords(ring)).filter(r => r.length >= 3))
          .filter(poly => poly.length > 0);
        return polys.length ? { type: 'MultiPolygon', coordinates: polys } : null;
      }
      return geom;
    }

    function fetchAndCacheBorders(res) {
      if (bordersCache[res]) return Promise.resolve(bordersCache[res]);
      return fetch(BORDERS_URLS[res])
        .then(r => r.json())
        .then(world => {
          const all = topojson.feature(world, world.objects.countries);
          const features = all.features
            .filter(f => TARGET_COUNTRY_IDS.has(f.id))
            .map(f => {
              const clipped = clipGeometry(f.geometry);
              return clipped ? { ...f, geometry: clipped } : null;
            })
            .filter(Boolean);
          const fc = { type: 'FeatureCollection', features };
          bordersCache[res] = fc;
          return fc;
        });
    }

    function updateBordersLayer() {
      if (!bordersVisible) return;
      const res = getBordersResolution();
      if (res === currentBordersRes && bordersLayer) return; // já está na resolução certa

      fetchAndCacheBorders(res).then(fc => {
        // Pode ter trocado de estado enquanto o fetch rodava
        if (!bordersVisible) return;
        if (bordersLayer) map.removeLayer(bordersLayer);
        const tc = getThemeColors();
        bordersLayer = L.geoJSON(fc, {
          style: { color: tc.ringDyn, weight: 1, fill: false, interactive: false, dashArray: '6 4' },
          interactive: false
        }).addTo(map);
        bordersLayer.bringToBack();
        currentBordersRes = res;
      }).catch(() => {});
    }

    // Labels de países (posicionados sobre as áreas visíveis no radar)
    const COUNTRY_LABELS = [
      { name: 'BRASIL',    lat: -24.5, lng: -53.5 },
      { name: 'PARAGUAI',  lat: -24.8, lng: -55.5 },
      { name: 'ARGENTINA', lat: -27.5, lng: -55.0 },
    ];
    let countryLabelMarkers = [];

    function showCountryLabels() {
      if (countryLabelMarkers.length) return; // já exibidos
      const tc = getThemeColors();
      COUNTRY_LABELS.forEach(c => {
        const marker = L.marker([c.lat, c.lng], {
          icon: L.divIcon({
            className: 'country-label',
            html: `<span style="color:${tc.textDim};font-size:13px;font-weight:700;letter-spacing:4px;font-family:'Roboto Mono',monospace;text-shadow:0 0 6px rgba(0,0,0,0.9);">${c.name}</span>`,
            iconSize: [120, 20],
            iconAnchor: [60, 10]
          }),
          interactive: false
        }).addTo(map);
        countryLabelMarkers.push(marker);
      });
    }

    function hideCountryLabels() {
      countryLabelMarkers.forEach(m => map.removeLayer(m));
      countryLabelMarkers = [];
    }

    function updateCountryLabelColors() {
      if (!countryLabelMarkers.length) return;
      hideCountryLabels();
      showCountryLabels();
    }

    function showBorders() {
      bordersVisible = true;
      updateBordersLayer();
      showCountryLabels();
    }

    function hideBorders() {
      bordersVisible = false;
      if (bordersLayer) {
        map.removeLayer(bordersLayer);
        bordersLayer = null;
      }
      currentBordersRes = null;
      hideCountryLabels();
    }

    function drawCountryBorders() {
      if (localStorage.getItem('radar-borders') === 'on') {
        showBorders();
      }
      // Trocar resolução ao mudar zoom
      map.on('zoomend', () => {
        if (bordersVisible) updateBordersLayer();
      });
    }

    // ==========================================
    // ANÉIS DE DISTÂNCIA (RANGE RINGS)
    // ==========================================
    let zoomRings = []; // anéis que aparecem/somem com zoom

    function drawRangeRings() {
      // Anéis fixos (sempre visíveis)
      const fixedDistances = [50, 100, 200, 300, 400];
      // Anéis dinâmicos (aparecem com zoom)
      // { km, minZoom }
      const dynamicDistances = [
        { km: 5, minZoom: 11 },
        { km: 10, minZoom: 10 },
        { km: 25, minZoom: 9 },
      ];

      fixedDistances.forEach(km => {
        L.circle([SBFI.lat, SBFI.lng], {
          radius: km * 1000,
          color: getThemeColors().ring,
          weight: 1,
          fill: false,
          dashArray: km === 400 ? null : '4 6',
          interactive: false
        }).addTo(rangeGroup);

        const labelLat = SBFI.lat + (km / 111.32);
        L.marker([labelLat, SBFI.lng], {
          icon: L.divIcon({
            className: 'range-ring-label',
            html: `${km}km`,
            iconSize: [40, 14],
            iconAnchor: [20, 7]
          }),
          interactive: false
        }).addTo(rangeGroup);
      });

      // Anéis dinâmicos — adicionados a um grupo separado
      dynamicDistances.forEach(d => {
        const circle = L.circle([SBFI.lat, SBFI.lng], {
          radius: d.km * 1000,
          color: getThemeColors().ringDyn,
          weight: 1,
          fill: false,
          dashArray: '3 5',
          interactive: false
        });

        const labelLat = SBFI.lat + (d.km / 111.32);
        const label = L.marker([labelLat, SBFI.lng], {
          icon: L.divIcon({
            className: 'range-ring-label',
            html: `${d.km}km`,
            iconSize: [40, 14],
            iconAnchor: [20, 7]
          }),
          interactive: false
        });

        zoomRings.push({ circle, label, minZoom: d.minZoom });
      });

      // Listener de zoom para mostrar/esconder anéis dinâmicos
      map.on('zoomend', updateZoomRings);
      updateZoomRings();

      // Cruz central
      const crossSize = 0.15;
      L.polyline([
        [SBFI.lat - crossSize, SBFI.lng],
        [SBFI.lat + crossSize, SBFI.lng]
      ], { color: getThemeColors().cross, weight: 1, interactive: false }).addTo(rangeGroup);

      L.polyline([
        [SBFI.lat, SBFI.lng - crossSize],
        [SBFI.lat, SBFI.lng + crossSize]
      ], { color: getThemeColors().cross, weight: 1, interactive: false }).addTo(rangeGroup);
    }

    function updateZoomRings() {
      const zoom = map.getZoom();
      zoomRings.forEach(r => {
        if (zoom >= r.minZoom) {
          if (!map.hasLayer(r.circle)) {
            r.circle.addTo(rangeGroup);
            r.label.addTo(rangeGroup);
          }
        } else {
          if (map.hasLayer(r.circle)) {
            rangeGroup.removeLayer(r.circle);
            rangeGroup.removeLayer(r.label);
          }
        }
      });
    }

    // ==========================================
    // MARCADORES DE AEROPORTOS
    // ==========================================
    const AIRPORTS = [
      { icao: 'SBFI', lat: -25.5963, lng: -54.4854, primary: true },
      { icao: 'SWIT', lat: -25.4849, lng: -54.4413 },
      { icao: 'SSAF', lat: -25.3690, lng: -54.4714 },
      { icao: 'SSFE', lat: -25.4601, lng: -54.5985 },
      { icao: 'SGES', lat: -25.4548, lng: -54.8429 },
      { icao: 'SGIB', lat: -25.4073, lng: -54.6193 },
      { icao: 'SARI', lat: -25.7370, lng: -54.4741 },
    ];

    function drawAirportMarkers() {
      AIRPORTS.forEach(ap => {
        const tc = getThemeColors();
        const style = ap.primary
          ? `color:${tc.main};font-weight:700;font-size:12px;text-shadow:0 0 8px ${tc.textGlow};`
          : `color:${tc.textDim};font-weight:500;font-size:10px;text-shadow:0 0 4px rgba(0,0,0,0.8);`;
        const symbol = ap.primary ? '✦' : '✧';

        L.marker([ap.lat, ap.lng], {
          icon: L.divIcon({
            className: 'range-ring-label',
            html: `<span style="${style}">${symbol} ${ap.icao}</span>`,
            iconSize: [60, 16],
            iconAnchor: [30, 8]
          }),
          interactive: false
        }).addTo(rangeGroup);
      });
    }

    // ==========================================
    // ÍCONE DE AERONAVE (SVG triângulo + label)
    // ==========================================
    const ZOOM_DETAIL_THRESHOLD = 9; // >= 9: label completo, < 9: só callsign

    function createAircraftIcon(track, acData, zoom) {
      const rotation = track || 0;
      const acColor = getThemeColors().main;
      const svg = `<svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" style="transform:rotate(${rotation}deg)">
        <polygon points="10,1 4,18 10,14 16,18" fill="${acColor}" fill-opacity="0.9" stroke="${acColor}" stroke-width="0.5"/>
      </svg>`;

      let labelHtml = '';
      if (acData) {
        const callsign = acData.callsign || '';
        const icao = acData.icao || '';
        // Linha 1: Voo (callsign) e/ou matrícula (ICAO)
        const isCallsignDifferent = callsign && callsign !== icao;
        const line1 = isCallsignDifferent
          ? `${callsign} <span class="ac-reg">${icao}</span>`
          : (callsign || icao);

        if (zoom >= ZOOM_DETAIL_THRESHOLD) {
          const fl = acData.alt != null ? 'FL' + Math.round(acData.alt / 100) : '';
          const spd = acData.speed != null ? acData.speed + 'kt' : '';
          const vs = acData.vrate != null && acData.vrate !== 0 ? (acData.vrate > 0 ? '+' : '') + acData.vrate + 'fpm' : '';
          const detail = [fl, spd, vs].filter(Boolean).join(' | ');
          labelHtml = `<div class="aircraft-label"><div class="ac-callsign">${line1}</div>${detail ? `<div class="ac-detail">${detail}</div>` : ''}</div>`;
        } else {
          labelHtml = `<div class="aircraft-label"><div class="ac-callsign">${callsign || icao}</div></div>`;
        }
      }

      return L.divIcon({
        html: `<div class="aircraft-icon-wrapper">${svg}${labelHtml}</div>`,
        className: '',
        iconSize: [20, 20],
        iconAnchor: [10, 10]
      });
    }

    // ==========================================
    // BUSCAR DADOS ADS-B
    // ==========================================
    async function fetchADSBData() {
      try {
        const response = await fetch(`${ADSB_API_BASE}/aircraft`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        const aircraft = (data.aircraft || [])
          .filter(a => a.lat != null && a.lon != null)
          .map(a => ({
            icao: a.icaoHex,
            callsign: (a.callsign || '').trim() || a.icaoHex,
            lat: Number(a.lat),
            lon: Number(a.lon),
            alt: a.altitude, // já em pés (do dump1090 via feeder)
            speed: a.speed,
            track: a.track != null ? Number(a.track) : null,
            vrate: a.vrate,
            squawk: a.squawk,
            onGround: a.onGround || false,
          }))
          .filter(a => {
            const dist = haversineKm(SBFI.lat, SBFI.lng, a.lat, a.lon);
            a.distance = Math.round(dist);
            return dist <= MAX_RANGE_KM;
          });

        updateSourceStatus(true, 'SBFI');
        updateAircraft(aircraft);
      } catch (err) {
        console.warn('Erro ao buscar dados ADS-B:', err.message);
        updateSourceStatus(false);
      }
    }

    // Haversine para distância em km
    function haversineKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // ==========================================
    // ATUALIZAR AERONAVES NO MAPA
    // ==========================================
    function updateAircraft(aircraft) {
      const currentIcaos = new Set(aircraft.map(a => a.icao));

      // Remover aeronaves que saíram
      Object.keys(aircraftMarkers).forEach(icao => {
        if (!currentIcaos.has(icao)) {
          aircraftGroup.removeLayer(aircraftMarkers[icao]);
          delete aircraftMarkers[icao];
        }
      });

      // Atualizar ou adicionar
      const zoom = map.getZoom();
      aircraft.forEach(a => {
        const tooltipContent = `${a.callsign}  FL${a.alt ? Math.round(a.alt / 100) : '---'}`;

        if (aircraftMarkers[a.icao]) {
          const marker = aircraftMarkers[a.icao];
          marker.setLatLng([a.lat, a.lon]);
          marker.setIcon(createAircraftIcon(a.track, a, zoom));
          if (selectedIcaos.has(a.icao) && marker._icon) {
            marker._icon.classList.add('aircraft-selected');
          }
          if (!selectedIcaos.has(a.icao)) {
            marker.setTooltipContent(tooltipContent);
          }
          marker._acData = a;
          // Atualizar painel fixo se esta aeronave está selecionada
          if (selectedIcaos.has(a.icao)) {
            showAircraftDetail(a);
          }
        } else {
          const marker = L.marker([a.lat, a.lon], {
            icon: createAircraftIcon(a.track, a, zoom)
          })
            .bindTooltip(tooltipContent, {
              permanent: false,
              direction: 'top',
              offset: [0, -12],
              className: 'aircraft-tooltip'
            })
            .on('click', function () {
              if (!selectedIcaos.has(a.icao)) this.unbindTooltip();
              drawTrail(a.icao);
            })
            .addTo(aircraftGroup);

          marker._acData = a;
          aircraftMarkers[a.icao] = marker;
        }
      });

      // Re-desenhar trails ativos
      selectedIcaos.forEach(icao => {
        if (aircraftMarkers[icao]) fetchTrail(icao);
      });

      // Atualizar contadores e lista
      document.getElementById('aircraftCount').textContent = aircraft.length;
      document.getElementById('panelCount').textContent = aircraft.length;
      updateAircraftList(aircraft);
    }

    // ==========================================
    // LISTA DE AERONAVES (PAINEL LATERAL)
    // ==========================================
    function updateAircraftList(aircraft) {
      const list = document.getElementById('aircraftList');

      if (aircraft.length === 0) {
        list.innerHTML = '<div class="no-data">Nenhuma aeronave detectada</div>';
        return;
      }

      // Ordenar por altitude decrescente
      const sorted = [...aircraft].sort((a, b) => (b.alt || 0) - (a.alt || 0));

      list.innerHTML = sorted.map(a => `
        <div class="aircraft-item" data-icao="${a.icao}">
          <span class="callsign">${a.callsign}</span>
          <span class="alt">${a.alt != null ? 'FL' + Math.round(a.alt / 100) : '---'}</span>
          <span class="speed">${a.speed != null ? a.speed + 'kt' : '---'}</span>
        </div>
      `).join('');

      // Click na lista → toggle trail da aeronave
      list.querySelectorAll('.aircraft-item').forEach(el => {
        el.addEventListener('click', () => {
          const icao = el.dataset.icao;
          const marker = aircraftMarkers[icao];
          if (marker && !selectedIcaos.has(icao)) {
            map.setView(marker.getLatLng(), 10, { animate: true });
          }
          drawTrail(icao);
        });
      });
    }

    // ==========================================
    // STATUS DA FONTE DE DADOS
    // ==========================================
    function updateSourceStatus(online, labelOverride) {
      const dot = document.getElementById('sourceDot');
      const label = document.getElementById('sourceLabel');

      if (online) {
        dot.classList.remove('offline');
        label.textContent = labelOverride || 'OPENSKY';
      } else {
        dot.classList.add('offline');
        label.textContent = 'OFFLINE';
      }
    }

    // ==========================================
    // PLAYER DE ÁUDIO
    // ==========================================
    function initAudioPlayer() {
      const player = document.getElementById('radioPlayer');
      const playBtn = document.getElementById('audioPlayBtn');
      const volBtn = document.getElementById('audioVolBtn');
      const volSlider = document.getElementById('audioVolSlider');
      const statusText = document.getElementById('audioStatus');
      const streamUrl = 'https://ic.io.tec.br/sbfi';

      let isPlaying = false;
      let isMuted = false;
      let prevVolume = 1.0;

      function getStreamUrl() {
        return `${streamUrl}?t=${Date.now()}&r=${Math.random().toString(36).substring(7)}`;
      }

      playBtn.addEventListener('click', () => {
        if (player.paused) {
          const source = player.querySelector('source');
          source.src = getStreamUrl();
          player.load();
          statusText.textContent = 'Conectando...';
          statusText.classList.remove('live');

          setTimeout(() => {
            player.play().then(() => {
              isPlaying = true;
              playBtn.querySelector('.material-icons').textContent = 'pause';
              playBtn.classList.add('playing');
              statusText.textContent = '● AO VIVO';
              statusText.classList.add('live');
              if (player.muted) player.muted = false;
            }).catch(() => {
              statusText.textContent = 'Falha na conexão';
              statusText.classList.remove('live');
            });
          }, 100);
        } else {
          player.pause();
          isPlaying = false;
          playBtn.querySelector('.material-icons').textContent = 'play_arrow';
          playBtn.classList.remove('playing');
          statusText.textContent = 'Disponível';
          statusText.classList.remove('live');
        }
      });

      volBtn.addEventListener('click', () => {
        if (isMuted) {
          player.volume = prevVolume;
          volSlider.value = prevVolume * 100;
          isMuted = false;
          volBtn.querySelector('.material-icons').textContent = 'volume_up';
        } else {
          prevVolume = player.volume;
          player.volume = 0;
          volSlider.value = 0;
          isMuted = true;
          volBtn.querySelector('.material-icons').textContent = 'volume_off';
        }
      });

      volSlider.addEventListener('input', function () {
        const v = this.value / 100;
        player.volume = v;
        isMuted = v === 0;
        if (v > 0) prevVolume = v;
        volBtn.querySelector('.material-icons').textContent =
          v === 0 ? 'volume_off' : v < 0.5 ? 'volume_down' : 'volume_up';
      });

      // Se o player der erro, tenta reconectar
      let reconnectTimeout = null;
      function reconnectStream() {
        if (!isPlaying || reconnectTimeout) return;
        statusText.textContent = 'Reconectando...';
        statusText.classList.remove('live');
        reconnectTimeout = setTimeout(() => {
          reconnectTimeout = null;
          const source = player.querySelector('source');
          source.src = getStreamUrl();
          player.load();
          player.play().catch(() => {
            // Tentar novamente em 5s
            setTimeout(() => reconnectStream(), 5000);
          });
        }, 3000);
      }

      player.addEventListener('error', reconnectStream);
      player.addEventListener('stalled', () => {
        if (isPlaying) {
          statusText.textContent = 'Buffering...';
          statusText.classList.remove('live');
          // Se ficar preso por 10s, forçar reconexão
          setTimeout(() => {
            if (isPlaying && !player.paused && statusText.textContent === 'Buffering...') {
              reconnectStream();
            }
          }, 10000);
        }
      });

      // Reconectar ao voltar online
      window.addEventListener('online', () => {
        if (isPlaying) reconnectStream();
        // Forçar refresh de aeronaves imediatamente
        fetchADSBData();
      });

      // Buffer management
      player.addEventListener('canplay', () => {
        if (!player.paused) {
          statusText.textContent = '● AO VIVO';
          statusText.classList.add('live');
          try {
            if (player.buffered.length > 0) {
              const bufferSize = player.buffered.end(player.buffered.length - 1) - player.buffered.start(0);
              if (bufferSize > 3) {
                player.currentTime = player.buffered.end(player.buffered.length - 1) - 1;
              }
            }
          } catch (e) { /* ignore */ }
        }
      });

      player.volume = 1.0;
    }

    // ==========================================
    // PAINEL TOGGLE (MOBILE)
    // ==========================================
    function initPanelToggle() {
      const panel = document.getElementById('infoPanel');
      const toggleBtn = document.getElementById('togglePanelBtn');
      const closeBtn = document.getElementById('closePanelBtn');

      toggleBtn.addEventListener('click', () => {
        panel.classList.add('visible');
      });

      closeBtn.addEventListener('click', () => {
        panel.classList.remove('visible');
      });

      // Fechar ao clicar em uma aeronave da lista (mobile)
      panel.addEventListener('click', (e) => {
        if (e.target.closest('.aircraft-item') && window.innerWidth <= 768) {
          panel.classList.remove('visible');
        }
      });
    }

    // ==========================================
    // MINHA LOCALIZAÇÃO
    // ==========================================
    let userLocationMarker = null;

    function initMyLocation() {
      const btn = document.getElementById('myLocationBtn');

      btn.addEventListener('click', () => {
        if (!navigator.geolocation) return;

        btn.classList.add('locating');

        navigator.geolocation.getCurrentPosition(
          (pos) => {
            btn.classList.remove('locating');
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;

            // Remover marcador anterior
            if (userLocationMarker) map.removeLayer(userLocationMarker);

            // Criar marcador de localização
            userLocationMarker = L.circleMarker([lat, lng], {
              radius: 7,
              color: getThemeColors().main,
              fillColor: getThemeColors().main,
              fillOpacity: 0.7,
              weight: 2
            }).addTo(map);

            userLocationMarker.bindTooltip('Você', {
              permanent: false,
              direction: 'top',
              offset: [0, -10],
              className: 'aircraft-tooltip'
            });

            map.setView([lat, lng], 12, { animate: true });
          },
          () => {
            btn.classList.remove('locating');
          },
          { enableHighAccuracy: true, timeout: 10000 }
        );
      });
    }

    // ==========================================
    // TEMA (verde padrão / vermelho noturno)
    // ==========================================
    function initThemeToggle() {
      const btn = document.getElementById('themeToggleBtn');
      const icon = btn.querySelector('.material-icons');

      btn.addEventListener('click', () => {
        const isRed = document.documentElement.getAttribute('data-theme') === 'red';
        if (isRed) {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('radar-theme', 'green');
          icon.textContent = 'nightlight';
          btn.title = 'Tema noturno (vermelho)';
        } else {
          document.documentElement.setAttribute('data-theme', 'red');
          localStorage.setItem('radar-theme', 'red');
          icon.textContent = 'light_mode';
          btn.title = 'Tema padrão (verde)';
        }

        // Re-desenhar elementos com cores hardcoded no JS
        redrawThemedElements();
      });
    }

    function redrawThemedElements() {
      // Fronteiras de países
      if (bordersLayer && bordersVisible) {
        bordersLayer.setStyle({ color: getThemeColors().ringDyn });
      }
      // Labels de países
      updateCountryLabelColors();

      // Range rings + cruz + aeroportos
      rangeGroup.clearLayers();
      zoomRings = [];
      drawRangeRings();
      drawAirportMarkers();

      // Re-criar ícones de aeronaves existentes
      const zoom = map.getZoom();
      Object.entries(aircraftMarkers).forEach(([icao, marker]) => {
        const data = marker._acData;
        if (data) {
          marker.setIcon(createAircraftIcon(data.track, data, zoom));
          if (selectedIcaos.has(icao) && marker._icon) {
            marker._icon.classList.add('aircraft-selected');
          }
        }
      });

      // User location marker
      if (userLocationMarker) {
        const tc = getThemeColors();
        userLocationMarker.setStyle({ color: tc.main, fillColor: tc.main });
      }
    }

    // ==========================================
    // INICIALIZAÇÃO
    // ==========================================
    document.addEventListener('DOMContentLoaded', () => {
      // Aplicar tema salvo ANTES de desenhar o mapa
      const savedTheme = localStorage.getItem('radar-theme');
      if (savedTheme === 'red') {
        document.documentElement.setAttribute('data-theme', 'red');
        document.getElementById('themeToggleBtn').querySelector('.material-icons').textContent = 'light_mode';
      }

      initMap();
      initAudioPlayer();
      initPanelToggle();
      initMyLocation();

      // Fullscreen button
      const fsBtn = document.getElementById('fullscreenBtn');
      fsBtn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
          fsBtn.querySelector('.material-icons').textContent = 'fullscreen_exit';
        } else {
          document.exitFullscreen();
          fsBtn.querySelector('.material-icons').textContent = 'fullscreen';
        }
      });
      document.addEventListener('fullscreenchange', () => {
        fsBtn.querySelector('.material-icons').textContent =
          document.fullscreenElement ? 'fullscreen_exit' : 'fullscreen';
      });

      // Reset view button
      document.getElementById('resetViewBtn').addEventListener('click', () => {
        map.setView([SBFI.lat, SBFI.lng], 9, { animate: true });
        clearTrail();
      });

      // Theme toggle button
      initThemeToggle();

      // Borders toggle button
      const bordersBtn = document.getElementById('bordersToggleBtn');
      const bordersIcon = bordersBtn.querySelector('.material-icons');
      // Aplicar estado salvo (padrão: off)
      if (localStorage.getItem('radar-borders') === 'on') {
        bordersIcon.textContent = 'public';
        bordersBtn.title = 'Ocultar fronteiras';
        bordersBtn.style.opacity = '1';
      } else {
        bordersIcon.textContent = 'public_off';
        bordersBtn.title = 'Mostrar fronteiras';
        bordersBtn.style.opacity = '0.5';
      }
      bordersBtn.addEventListener('click', () => {
        if (bordersVisible) {
          hideBorders();
          localStorage.setItem('radar-borders', 'off');
          bordersIcon.textContent = 'public_off';
          bordersBtn.title = 'Mostrar fronteiras';
          bordersBtn.style.opacity = '0.5';
        } else {
          showBorders();
          localStorage.setItem('radar-borders', 'on');
          bordersIcon.textContent = 'public';
          bordersBtn.title = 'Ocultar fronteiras';
          bordersBtn.style.opacity = '1';
        }
      });

      // Limpar trail ao clicar no mapa vazio
      map.on('click', (e) => {
        // Só limpar se clicou fora de um marcador
        if (!e.originalEvent._fromMarker) clearTrail();
      });

      // Primeira busca
      fetchADSBData();

      // Atualizar labels ao mudar zoom
      map.on('zoomend', () => {
        const zoom = map.getZoom();
        Object.entries(aircraftMarkers).forEach(([icao, marker]) => {
          const a = marker._acData;
          if (a) {
            marker.setIcon(createAircraftIcon(a.track, a, zoom));
            if (selectedIcaos.has(icao) && marker._icon) {
              marker._icon.classList.add('aircraft-selected');
            }
          }
        });
      });

      // Refresh periódico
      refreshTimer = setInterval(fetchADSBData, REFRESH_INTERVAL_MS);
    });
  </script>
